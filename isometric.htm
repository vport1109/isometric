<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; overflow: hidden; background: #f0f0f0; touch-action: none; }
        canvas { display: block; background: #fff; }
    </style>
</head>
<body>
<canvas id="paintCanvas"></canvas>

<script>
    const canvas = document.getElementById('paintCanvas');
    const ctx = canvas.getContext('2d');
    
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let startX, startY;
    let isDrawing = false;
    const angles = [0, 30, 90, 150, 180, 210, 270, 330]; // Изометрические углы

    canvas.addEventListener('touchstart', e => {
        isDrawing = true;
        startX = e.touches[0].clientX;
        startY = e.touches[0].clientY;
    });

    canvas.addEventListener('touchmove', e => {
        if (!isDrawing) return;
        
        const curX = e.touches[0].clientX;
        const curY = e.touches[0].clientY;
        
        const dx = curX - startX;
        const dy = curY - startY;
        
        // 1. Считаем реальный угол и дистанцию
        const angle = Math.atan2(dy, dx) * 180 / Math.PI;
        const dist = Math.sqrt(dx * dx + dy * dy);
        
        // 2. Находим ближайший изометрический угол
        const closestAngle = angles.reduce((prev, curr) => {
            return (Math.abs(curr - angle) < Math.abs(prev - angle) ? curr : prev);
        });

        // 3. Вычисляем "примагниченную" точку
        const snappedX = startX + dist * Math.cos(closestAngle * Math.PI / 180);
        const snappedY = startY + dist * Math.sin(closestAngle * Math.PI / 180);

        // Отрисовка (очищаем и рисуем заново для предпросмотра)
        draw(snappedX, snappedY);
    });

    canvas.addEventListener('touchend', () => isDrawing = false);

    function draw(x, y) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        // Тут можно добавить логику сохранения старых линий в массив
        ctx.beginPath();
        ctx.moveTo(startX, startY);
        ctx.lineTo(x, y);
        ctx.stroke();
    }
</script>
</body>
</html>
