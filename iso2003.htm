<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BIM Pipe Pro - Fixed Graphics</title>
    <style>
        body { margin: 0; overflow: hidden; background: #f8f9fa; font-family: sans-serif; touch-action: none; }
        canvas { display: block; }
        .ui-panel { 
            position: fixed; top: 10px; left: 10px; background: white; padding: 12px; 
            border-radius: 10px; box-shadow: 0 2px 15px rgba(0,0,0,0.1); z-index: 100; font-size: 14px;
        }
        .controls { 
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); 
            display: flex; gap: 8px; background: rgba(255,255,255,0.98); padding: 12px; 
            border-radius: 50px; box-shadow: 0 5px 25px rgba(0,0,0,0.2); z-index: 100;
        }
        #lengthInputContainer {
            position: fixed; top: 35%; left: 50%; transform: translate(-50%, -50%);
            background: white; padding: 25px; border-radius: 15px; box-shadow: 0 15px 50px rgba(0,0,0,0.4);
            display: none; z-index: 200; border: 3px solid #2196F3; text-align: center;
        }
        #lengthInputContainer input {
            width: 140px; padding: 12px; font-size: 26px; border: 2px solid #ddd; outline: none; border-radius: 10px; margin-bottom: 15px;
        }
        button { padding: 10px 15px; border: none; border-radius: 20px; cursor: pointer; font-weight: bold; background: #eee; font-size: 16px; min-width: 50px; transition: 0.2s; }
        button.active { background: #2196F3; color: white; }
        .btn-ok { display: block; width: 100%; background: #4CAF50; color: white; margin-top: 5px; }
    </style>
</head>
<body>

<div class="ui-panel">
    <div id="pipeStats">Метраж: 0.00 м</div>
    <div id="debugInfo" style="font-size: 10px; color: #999; margin-top: 5px;">Режим: Рисование</div>
</div>

<div id="lengthInputContainer">
    <label id="dirLabel" style="display:block; margin-bottom:10px; font-weight:bold; color:#2196F3">Длина (м):</label>
    <input type="number" id="lenInput" step="0.1" inputmode="decimal">
    <button class="btn-ok" onclick="confirmLength()">ОК (Enter)</button>
</div>

<div class="controls">
    <button id="drawBtn" class="active" onclick="setMode('draw')">✏️</button>
    <button id="nodeBtn" onclick="setMode('node')">📍</button>
    <button id="deleteBtn" onclick="setMode('delete')">🗑️</button>
    <button id="panBtn" onclick="setMode('pan')">🖐️</button>
    <button onclick="undo()">↩</button>
    <button onclick="clearAll()" style="background:#333; color:white;">✖</button>
</div>

<canvas id="pipeCanvas"></canvas>

<script>
    const canvas = document.getElementById('pipeCanvas');
    const ctx = canvas.getContext('2d');
    const lenInput = document.getElementById('lenInput');
    const lenContainer = document.getElementById('lengthInputContainer');
    
    let pipes = [], mode = 'draw', scale = 1.0, offsetX = window.innerWidth / 2, offsetY = window.innerHeight / 2;
    let isAction = false, highlightedPipeIdx = -1, injectionStep = 0;
    let injectPipe = null, injectBasePoint = null, injectTargetPoint = null;
    let lastPoint = {x:0,y:0,z:0}, currentWorld = {x:0,y:0,z:0}, lockedDir = {x:0,y:0,z:0,n:""}, lastM = {x:0,y:0};
    let initialDist = 0;

    const isoX = Math.cos(Math.PI / 6), isoY = Math.sin(Math.PI / 6); 

    function init() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; render(); }
    function worldToScreen(wx, wy, wz) { return { x: ((wx - wy) * isoX) * scale + offsetX, y: ((wx + wy) * isoY - wz) * scale + offsetY }; }
    function screenToWorld(sx, sy) { return { x: (sx - offsetX) / scale, y: (sy - offsetY) / scale }; }

    function distToSeg(p, v, w) {
        const l2 = (v.x-w.x)**2 + (v.y-w.y)**2; if (l2 === 0) return Math.hypot(p.x-v.x, p.y-v.y);
        let t = Math.max(0, Math.min(1, ((p.x-v.x)*(w.x-v.x) + (p.y-v.y)*(w.y-v.y)) / l2));
        return Math.hypot(p.x-(v.x+t*(w.x-v.x)), p.y-(v.y+t*(w.y-v.y)));
    }

    function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Сетка
        ctx.strokeStyle = '#e9ecef'; ctx.lineWidth = 0.5;
        const gs = 100 * scale;
        for(let x = offsetX % gs; x < canvas.width; x += gs) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,canvas.height); ctx.stroke(); }
        for(let y = offsetY % gs; y < canvas.height; y += gs) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(canvas.width,y); ctx.stroke(); }

        let nodeCounter = new Map();

        // 1. Рисуем трубы
        pipes.forEach((p, i) => {
            let p1 = worldToScreen(p.x1, p.y1, p.z1), p2 = worldToScreen(p.x2, p.y2, p.z2);
            ctx.strokeStyle = (highlightedPipeIdx === i) ? '#f44336' : '#2c3e50';
            ctx.lineWidth = (highlightedPipeIdx === i) ? 5 * scale : 3 * scale;
            ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
            
            // Собираем узлы
            [ `${p.x1},${p.y1},${p.z1}`, `${p.x2},${p.y2},${p.z2}` ].forEach(k => nodeCounter.set(k, (nodeCounter.get(k)||0)+1));
        });

        // 2. Рисуем узлы (точки)
        nodeCounter.forEach((count, key) => {
            const [wx, wy, wz] = key.split(',').map(Number);
            const pos = worldToScreen(wx, wy, wz);
            ctx.fillStyle = count >= 3 ? '#f44336' : (count === 2 ? '#2196F3' : '#9e9e9e');
            ctx.beginPath(); ctx.arc(pos.x, pos.y, 5 * scale, 0, Math.PI*2); ctx.fill();
        });

        // 3. Рисуем квадратики выбора для инъекции узла
        if (mode === 'node' && injectionStep === 1 && injectPipe) {
            [ {x:injectPipe.x1, y:injectPipe.y1, z:injectPipe.z1}, {x:injectPipe.x2, y:injectPipe.y2, z:injectPipe.z2} ].forEach(pt => {
                let s = worldToScreen(pt.x, pt.y, pt.z);
                ctx.strokeStyle = '#9c27b0'; ctx.lineWidth = 3;
                ctx.strokeRect(s.x - 12, s.y - 12, 24, 24);
            });
        }

        // 4. Пунктирная линия (Preview)
        if (isAction === 'draw') {
            let p1 = worldToScreen(lastPoint.x, lastPoint.y, lastPoint.z);
            let p2 = worldToScreen(currentWorld.x, currentWorld.y, currentWorld.z);
            ctx.strokeStyle = '#2196F3'; ctx.lineWidth = 2.5; ctx.setLineDash([8, 5]);
            ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke(); 
            ctx.setLineDash([]);
        }

        updateStats();
    }

    function handleZoom(delta, mx, my) {
        const wp = { x: (mx - offsetX) / scale, y: (my - offsetY) / scale };
        scale *= (delta > 0 ? 0.9 : 1.1);
        offsetX = mx - wp.x * scale; offsetY = my - wp.y * scale;
        render();
    }

    function handleStart(x, y) {
        if (lenContainer.style.display === 'block') return;

        if (mode === 'node') {
            if (injectionStep === 0 && highlightedPipeIdx !== -1) { 
                injectPipe = pipes[highlightedPipeIdx]; 
                injectionStep = 1; render(); 
            } else if (injectionStep === 1) {
                let pts = [ {x:injectPipe.x1,y:injectPipe.y1,z:injectPipe.z1}, {x:injectPipe.x2,y:injectPipe.y2,z:injectPipe.z2} ];
                pts.forEach((pt, idx) => {
                    let s = worldToScreen(pt.x, pt.y, pt.z);
                    if (Math.hypot(x-s.x, y-s.y) < 40) { 
                        injectBasePoint = pt; 
                        injectTargetPoint = pts[1-idx]; 
                        injectionStep = 2; showInput(); 
                    }
                });
            }
            return;
        }

        if (mode === 'delete' && highlightedPipeIdx !== -1) { pipes.splice(highlightedPipeIdx, 1); highlightedPipeIdx = -1; render(); return; }
        if (mode === 'pan') { isAction = 'pan'; lastM = {x, y}; return; }
        
        isAction = 'draw';
        let snapped = null;
        pipes.forEach(p => { 
            [{x:p.x1, y:p.y1, z:p.z1}, {x:p.x2, y:p.y2, z:p.z2}].forEach(n => {
                let s = worldToScreen(n.x, n.y, n.z); if(Math.hypot(x-s.x, y-s.y) < 35) snapped = n;
            });
        });
        lastPoint = snapped ? {...snapped} : {...screenToWorld(x,y), z:0};
        currentWorld = {...lastPoint};
    }

    function handleMove(x, y) {
        if (isAction === 'pan') { offsetX += x - lastM.x; offsetY += y - lastM.y; lastM = {x, y}; render(); return; }
        
        highlightedPipeIdx = -1;
        if (mode === 'delete' || (mode === 'node' && injectionStep === 0)) {
            pipes.forEach((p, i) => { 
                let s1 = worldToScreen(p.x1, p.y1, p.z1), s2 = worldToScreen(p.x2, p.y2, p.z2);
                if (distToSeg({x, y}, s1, s2) < 20) highlightedPipeIdx = i; 
            });
        }

        if (isAction === 'draw') {
            let pS = worldToScreen(lastPoint.x, lastPoint.y, lastPoint.z);
            let dx = (x - pS.x)/scale, dy = (y - pS.y)/scale;
            let ang = (Math.atan2(dy, dx)*180/Math.PI+360)%360;
            const ds = [
                {ang:30,x:1,y:0,z:0,n:"X+"}, {ang:150,x:0,y:1,z:0,n:"Y+"},
                {ang:210,x:-1,y:0,z:0,n:"X-"}, {ang:330,x:0,y:-1,z:0,n:"Y-"},
                {ang:90,x:0,y:0,z:-1,n:"DN"}, {ang:270,x:0,y:0,z:1,n:"UP"}
            ];
            lockedDir = ds.reduce((p, c) => Math.abs(c.ang-ang) < Math.abs(p.ang-ang) ? c : p);
            
            if(lockedDir.n === "DN" || lockedDir.n === "UP") {
                currentWorld = {x: lastPoint.x, y: lastPoint.y, z: lastPoint.z - dy};
            } else {
                let d = Math.hypot(dx,dy);
                currentWorld = {x:lastPoint.x + lockedDir.x * d * 1.15, y:lastPoint.y + lockedDir.y * d * 1.15, z:lastPoint.z};
            }
        }
        render();
    }

    function showInput() { 
        lenContainer.style.display = 'block'; 
        lenInput.value = (mode === 'node') ? (injectPipe.len/2).toFixed(2) : "1.0";
        setTimeout(() => { lenInput.focus(); lenInput.select(); }, 50); 
    }

    function confirmLength() {
        const val = parseFloat(lenInput.value);
        if (isNaN(val) || val <= 0) { lenContainer.style.display = 'none'; return; }
        
        if (injectionStep === 2) {
            const ratio = val / injectPipe.len;
            const nP = { 
                x: injectBasePoint.x + (injectTargetPoint.x-injectBasePoint.x)*ratio, 
                y: injectBasePoint.y + (injectTargetPoint.y-injectBasePoint.y)*ratio, 
                z: injectBasePoint.z + (injectTargetPoint.z-injectBasePoint.z)*ratio 
            };
            pipes = pipes.filter(p => p !== injectPipe);
            pipes.push({x1:injectBasePoint.x, y1:injectBasePoint.y, z1:injectBasePoint.z, x2:nP.x, y2:nP.y, z2:nP.z, len:val});
            pipes.push({x1:nP.x, y1:nP.y, z1:nP.z, x2:injectTargetPoint.x, y2:injectTargetPoint.y, z2:injectTargetPoint.z, len:injectPipe.len-val});
            setMode('draw'); lastPoint = nP;
        } else {
            let p2 = { x: lastPoint.x + lockedDir.x*val*100, y: lastPoint.y + lockedDir.y*val*100, z: lastPoint.z + lockedDir.z*val*100 };
            pipes.push({x1:lastPoint.x, y1:lastPoint.y, z1:lastPoint.z, x2:p2.x, y2:p2.y, z2:p2.z, len:val});
            lastPoint = p2;
        }
        lenContainer.style.display = 'none'; injectionStep = 0; render();
    }

    // События
    lenInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') confirmLength(); if (e.key === 'Escape') { lenContainer.style.display = 'none'; injectionStep = 0; render(); } });
    canvas.addEventListener('wheel', e => { e.preventDefault(); handleZoom(e.deltaY, e.clientX, e.clientY); }, {passive:false});
    canvas.addEventListener('mousedown', e => handleStart(e.clientX, e.clientY));
    window.addEventListener('mousemove', e => handleMove(e.clientX, e.clientY));
    window.addEventListener('mouseup', () => { if (isAction === 'draw') showInput(); isAction = false; render(); });

    canvas.addEventListener('touchstart', e => {
        if (e.touches.length === 2) { initialDist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY); }
        else { let t = e.touches[0]; handleStart(t.clientX, t.clientY); }
        e.preventDefault();
    }, {passive:false});

    canvas.addEventListener('touchmove', e => {
        if (e.touches.length === 2) {
            let d = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
            handleZoom(initialDist - d, (e.touches[0].pageX + e.touches[1].pageX)/2, (e.touches[0].pageY + e.touches[1].pageY)/2);
            initialDist = d;
        } else { let t = e.touches[0]; handleMove(t.clientX, t.clientY); }
        e.preventDefault();
    }, {passive:false});

    canvas.addEventListener('touchend', () => { if (isAction === 'draw') showInput(); isAction = false; render(); });

    function setMode(m) { 
        mode = m; injectionStep = 0; injectPipe = null; highlightedPipeIdx = -1;
        document.querySelectorAll('.controls button').forEach(b => b.classList.toggle('active', b.id === m+'Btn'));
        document.getElementById('debugInfo').innerText = "Режим: " + (m==='draw'?'Труба':m==='node'?'Узел':m==='delete'?'Удаление':'Панорама');
        render(); 
    }

    function undo() { pipes.pop(); render(); }
    function clearAll() { if(confirm("Очистить?")) { pipes=[]; render(); } }
    function updateStats() { let l = pipes.reduce((s, p) => s + p.len, 0); document.getElementById('pipeStats').innerText = `Метраж: ${l.toFixed(2)} м`; }
    
    window.addEventListener('resize', init);
    init();
</script>
</body>
</html>
